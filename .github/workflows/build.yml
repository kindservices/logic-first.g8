name: Two-Phase Build and Test

on:
  push:
    branches:
      - "*" 

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Cache SBT
        uses: actions/cache@v2
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt') }}
          restore-keys: |
                ${{ runner.os }}-sbt-

      - name: Generate our test project
        run: |
          echo "GITHUB_WORKSPACE is >$GITHUB_WORKSPACE< and env.GITHUB_WORKSPACE is >${{ env.GITHUB_WORKSPACE}}<"
          sbt new file://$GITHUB_WORKSPACE --name=dave
          cd localtest
          sbt test
